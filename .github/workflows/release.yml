name: "Publish Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm install

      - name: extract release notes from CHANGELOG
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $changelog = Get-Content CHANGELOG.md -Raw -Encoding utf8
          $regex = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $m = [regex]::Match($changelog, $regex)
          if (-not $m.Success) {
            $body = "See CHANGELOG.md for details."
          } else {
            $body = $m.Value.Trim()
          }
          $body | Out-File -FilePath release_notes.md -Encoding utf8 -NoNewline
          Write-Host "----- release notes -----"
          Write-Host $body

      - name: build & publish (nsis + msi)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "TieZ v__VERSION__"
          releaseBody: ${{ github.event.head_commit.message }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: update release body with CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $body = Get-Content release_notes.md -Raw
          gh release edit "$tag" --notes "$body" --repo $env:GITHUB_REPOSITORY

      - name: build portable bundle
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: npm run build:portable

      - name: upload portable bundle
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $portable = Get-ChildItem -Path artifacts/portable -Filter '*.zip' | Select-Object -First 1
          if (-not $portable) { throw 'portable zip missing' }
          gh release upload "v$version" "$($portable.FullName)" --repo $env:GITHUB_REPOSITORY --clobber

      - name: generate latest.json for updater
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          # tauri-action 已签名 nsis exe 并生成 .sig
          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter '*-setup.exe' | Select-Object -First 1
          $sig  = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter '*-setup.exe.sig' | Select-Object -First 1
          if (-not $nsis -or -not $sig) {
            Write-Host 'no signed nsis or .sig found, skip latest.json (updater disabled until signed build)'
            exit 0
          }
          $sigContent = Get-Content $sig.FullName -Raw
          $assetUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/$($nsis.Name)"
          $manifest = @{
            version = $version
            notes = "See CHANGELOG.md for details"
            pub_date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            platforms = @{
              'windows-x86_64' = @{
                signature = $sigContent.Trim()
                url = $assetUrl
              }
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path latest.json -Value $manifest -Encoding utf8 -NoNewline
          gh release upload "$tag" 'latest.json' --repo $env:GITHUB_REPOSITORY --clobber
