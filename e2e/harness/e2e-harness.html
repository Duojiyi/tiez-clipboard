<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magpie e2e 关键路径脚手架</title>
    <style>
      /* e2e 关键路径脚手架样式：保持环境稳定、元素可定位 */
      html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
      #root { height: 100vh; display: flex; flex-direction: column; }
      .case-toolbar { flex: 0 0 auto; padding: 8px 12px; border-bottom: 1px solid #ddd; font-size: 13px; }
      .clip-item { padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
      .clip-item.selected { background: #eef4ff; outline: 2px solid #5b8def; }
      .clip-item .content { font-size: 13px; }
      .clip-item .tags { font-size: 11px; color: #1668dc; margin-top: 4px; }
      .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; gap: 12px; }
      .setting-row .label { font-size: 13px; }
      .status-line { padding: 8px 12px; font-size: 12px; color: #555; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/e2e/harness/e2e-harness.tsx"></script>
  </body>
</html>
